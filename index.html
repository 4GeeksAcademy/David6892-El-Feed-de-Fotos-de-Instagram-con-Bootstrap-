<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Photo Feed con Bootstrap</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-light">
        <div class="container-fluid">
            <a class="navbar-brand " href="#"><i class="fa-brands fa-instagram mx-2"></i>Instagram</a>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                </ul>
                <!-- Button trigger modal -->
                <button type="button" class="btn btn-success mx-2" data-bs-toggle="modal"
                    data-bs-target="#exampleModal">
                    Create a new post
                </button>

                <!-- Modal -->
                <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel"
                    aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="exampleModalLabel">Create a new post</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"
                                    aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label for="message-text" class="col-form-label">Caption:</label>
                                    <textarea class="form-control"
                                        id="message-text">Add the caption of your post here</textarea>
                                    <button type="button" class="btn btn-outline-dark"><i
                                            class="fa-solid fa-camera"></i></button>
                                    <button type="button" class="btn btn-outline-dark"><i
                                            class="fa-solid fa-location-dot"></i></button>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                <button type="button" class="btn btn-success">Publish</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown"
                        aria-expanded="false">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Profile</a></li>
                        <li><a class="dropdown-item" href="#">Accesibility</a></li>
                        <li><a class="dropdown-item" href="#">Privacy and Data</a></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item link-danger" href="#">Log out</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>
    <ul class="nav nav-tabs">
        <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="Grid3.html"><i class="fa-solid fa-table-cells"></i></a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="Grid1.html"><i class="fa-solid fa-square"></i>
            </a>
        </li>
    </ul>
    <nav aria-label="Page navigation example">
        <ul class="pagination justify-content-center">
            <li class="page-item"><a class="fa-solid fa-table-cells" href="Grid3.html"></a></li>
            <li class="page-item"><a class="fa-solid fa-square" href="Grid1.html"></a></li>
        </ul>
    </nav>
    <!-- Botón activador -->
    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#contenidoColapsable">
        Mostrar/Ocultar contenido
    </button>

    <!-- Contenido que se colapsa -->
    <div class="collapse.show" id="contenidoColapsable">
        <div class="card card-body">
            <div class="row">
                <div class="col-4"><img
                        src="https://cdn.agenciasinc.es/var/ezwebin_site/storage/images/_aliases/img_1col/noticias/los-primeros-perros-ya-mostraban-gran-diversidad-hace-11-000-anos/12355432-3-esl-MX/Los-primeros-perros-ya-mostraban-gran-diversidad-hace-11-000-anos.jpg"
                        class="img-thumbnail"></div>
                <div class="col-4"><img
                        src="https://unicla.edu.mx/wp-content/uploads/2024/05/Portada_Blog_2024_23_Mayo-1920x960.webp"
                        class="img-thumbnail img-fluid" alt=""></div>
                <div class="col-4"><img
                        src="https://www.hostelworld.com/blog/wp-content/uploads/2017/09/22157568_282474515600529_7101395220373176320_n.jpg"
                        class="img-thumbnail" alt=""></div>
            </div>
            <div class="row">
                <div class="col-4"><img
                        src="https://ichef.bbci.co.uk/news/1024/branded_mundo/5815/live/467d1850-e2eb-11ef-a83b-bf768968ed36.jpg"
                        class="img-thumbnail" alt=""></div>
                <div class="col-4"><img
                        src="https://images.adsttc.com/media/images/5d44/14fa/284d/d1fd/3a00/003d/newsletter/eiffel-tower-in-paris-151-medium.jpg?1564742900"
                        class="img-thumbnail" alt=""></div>
                <div class="col-4"><img
                        src="https://www.mustangmotorsport.com.au/cdn/shop/files/Image_with_text_photo_7.png?v=1755135642&width=1200"
                        class="img-thumbnail" alt=""></div>
            </div>
            <div class="row">
                <div class="col-4"><img src="https://i.redd.it/g5ujnqyp84251.jpg" class="img-thumbnail" alt=""></div>
                <div class="col-4"><img src="https://msmk.university/wp-content/uploads/2025/02/Foto25.jpg"
                        class="img-thumbnail" alt=""></div>
                <div class="col-4"><img src="https://cdn.motor1.com/images/mgl/lE2M3J/s1/2025-bmw-m4-cs.jpg"
                        class="img-thumbnail" alt=""></div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
</body>

</html>
