<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Photo Feed con Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-light">
        <div class="container-fluid">
            <a class="navbar-brand " href="#"><i class=""><i class="bi bi-instagram mx-2"></i></i>Instagram</a>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                </ul>
                <!-- Button trigger modal -->
                <button type="button" class="btn btn-success mx-2" data-bs-toggle="modal"
                    data-bs-target="#exampleModal">
                    Create a new post
                </button>

                <!-- Modal -->
                <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel"
                    aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="exampleModalLabel">Create a new post</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"
                                    aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label for="message-text" class="col-form-label">Caption:</label>
                                    <textarea class="form-control"
                                        id="message-text">Add the caption of your post here</textarea>
                                    <button type="button" class="btn btn-outline-dark"><i
                                            class=""></i><i class="bi bi-camera-fill"></i></button>
                                    <button type="button" class="btn btn-outline-dark"><i
                                            class=""><i class="bi bi-geo-alt-fill"></i></i></button>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                <button type="button" class="btn btn-success">Publish</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown"
                        aria-expanded="false">
                        <i class=""><i class="bi bi-gear-fill"></i></i>
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Profile</a></li>
                        <li><a class="dropdown-item" href="#">Accesibility</a></li>
                        <li><a class="dropdown-item" href="#">Privacy and Data</a></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item link-danger" href="#">Log out</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>


    <ul class="nav nav-tabs justify-content-center" id="myTab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="home-tab" data-bs-toggle="tab" data-bs-target="#home-tab-pane"
                type="button" role="tab" aria-controls="home-tab-pane" aria-selected="true"><i
                    class="bi bi-grid-3x3"></i></button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="profile-tab" data-bs-toggle="tab" data-bs-target="#profile-tab-pane"
                type="button" role="tab" aria-controls="profile-tab-pane" aria-selected="false"><i
                    class="bi bi-square-fill"></i></button>
        </li>

    </ul>

    <div class="tab-content img-thumbnail" id="myTabContent">
        <div class="tab-pane fade show active" id="home-tab-pane" role="tabpanel" aria-labelledby="home-tab"
            tabindex="0">
            
            <div class="row g-1 m-1 justify-content-center">
                <div class="col-4" style="width: 18rem;"><img src="https://picsum.photos/200" class="card-img-top" alt="..."></div>
                <div class="col-4" style="width: 18rem;"><img src="https://picsum.photos/200" class="card-img-top" alt="..."></div>
                <div class="col-4" style="width: 18rem;"><img src="https://picsum.photos/200" class="card-img-top" alt="..."></div>
            </div>

            <div class="row g-1 m-1 justify-content-center">
                <div class="col-4" style="width: 18rem;"><img src="https://picsum.photos/200" class="card-img-top" alt="..."></div>
                <div class="col-4" style="width: 18rem;"><img src="https://picsum.photos/200" class="card-img-top" alt="..."></div>
                <div class="col-4" style="width: 18rem;"><img src="https://picsum.photos/200" class="card-img-top" alt="..."></div>
            </div>

            <div class="row g-1 m-1 justify-content-center">
                <div class="col-4" style="width: 18rem;"><img src="https://picsum.photos/200" class="card-img-top" alt="..."></div>
                <div class="col-4" style="width: 18rem;"><img src="https://picsum.photos/200" class="card-img-top" alt="..."></div>
                <div class="col-4" style="width: 18rem;"><img src="https://picsum.photos/200" class="card-img-top" alt="..."></div>
            </div>

        </div>


        <div class="tab-pane fade" id="profile-tab-pane" role="tabpanel"
            aria-labelledby="profile-tab" tabindex="0">

                
                <div class="card mx-auto my-2" style="width: 18rem;">
                    <div class="card-header">
                        Featured
                    </div>
                    <img src="https://picsum.photos/200" class="card-img-top" alt="...">
                    <div class="card-footer">
                        Card footer
                    </div>
                </div>

                <div class="card mx-auto my-2" style="width: 18rem;">
                    <div class="card-header">
                        Featured
                    </div>
                    <img src="https://picsum.photos/200" class="card-img-top" alt="...">
                    <div class="card-footer">
                        Card footer
                    </div>
                </div>

                <div class="card mx-auto" style="width: 18rem;">
                    <div class="card-header">
                        Featured
                    </div>
                    <img src="https://picsum.photos/200" class="card-img-top" alt="...">
                    <div class="card-footer">
                        Card footer
                    </div>
                </div>
    
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
</body>

</html>
